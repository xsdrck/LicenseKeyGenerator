name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/LicenseKeyGenerator.Maui/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/LicenseKeyGenerator.Maui/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: false
        default: '1.0.0'
      build_type:
        description: '构建类型'
        required: true
        type: choice
        options:
          - Release
          - Debug
        default: 'Release'

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/LicenseKeyGenerator.Maui/LicenseKeyGenerator.Maui.csproj'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 配置 .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 安装 .NET MAUI 工作负载
      run: dotnet workload install maui-android
        
    - name: 恢复 NuGet 包
      run: dotnet restore ${{ env.PROJECT_PATH }}
      
    - name: 构建 Android APK
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c ${{ inputs.build_type || 'Release' }} \
          -f net8.0-android \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=False \
          -p:ApplicationVersion=${{ github.run_number }} \
          -p:ApplicationDisplayVersion=${{ inputs.version || '1.0.0' }}
          
    - name: 查找生成的 APK
      id: find-apk
      shell: bash
      run: |
        APK_PATH=$(find src/LicenseKeyGenerator.Maui/bin -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -f "$APK_PATH" ]; then
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK_NAME=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "✓ 找到 APK: $APK_PATH"
        else
          echo "✗ 未找到 APK 文件"
          exit 1
        fi
        
    - name: 上传 APK 构件
      uses: actions/upload-artifact@v4
      with:
        name: LicenseKeyGenerator-Android-${{ inputs.build_type || 'Release' }}-${{ github.run_number }}
        path: ${{ steps.find-apk.outputs.APK_PATH }}
        retention-days: 30
